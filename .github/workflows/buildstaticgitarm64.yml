name: Build Static Git for Android ARM64

on:
  workflow_dispatch:
  push:
    branches: "main"

jobs:
  build:
    runs-on: ubuntu-24.04-arm  # Native ARM64 runner

    steps:
      - name: Get latest git tag from git/git
        id: latest
        run: |
          LATEST_TAG=$(git ls-remote --tags --sort='-v:refname' \
            https://github.com/git/git.git \
            'v[0-9]*.[0-9]*.[0-9]*' \
            | grep -v '\^{}' \
            | head -1 \
            | sed 's|.*refs/tags/||')
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest git tag: $LATEST_TAG"


      - name: Clone git/git at latest tag
        run: |
          TAG="${{ steps.latest.outputs.tag }}"
          git clone --depth 1 --branch $TAG https://github.com/git/git.git git-src
          cd git-src && git log --oneline -1

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential \
            musl-tools \
            musl-dev \
            zlib1g-dev \
            libssl-dev \
            libexpat1-dev \
            gettext \
            pkg-config

      - name: Build static git binary
        run: |
          cd git-src

          make configure
          ./configure \
            CC=musl-gcc \
            CFLAGS="-Os -ffunction-sections -fdata-sections" \
            LDFLAGS="-static -Wl,--gc-sections" \
            --prefix=/tmp/git-install \
            NO_TCLTK=1 \
            NO_PYTHON=1 \
            NO_PERL=1 \
            NO_GETTEXT=1 \
            NO_ICONV=1

          make -j$(nproc) \
            CC=musl-gcc \
            CFLAGS="-Os -ffunction-sections -fdata-sections" \
            LDFLAGS="-static -Wl,--gc-sections" \
            NO_TCLTK=1 \
            NO_PYTHON=1 \
            NO_PERL=1 \
            NO_GETTEXT=1 \
            NO_ICONV=1

          make install \
            NO_TCLTK=1 NO_PYTHON=1 NO_PERL=1 NO_GETTEXT=1 NO_ICONV=1

      - name: Verify & package
        run: |
          TAG="${{ steps.latest.outputs.tag }}"
          BIN=/tmp/git-install/bin/git

          strip $BIN

          echo "=== File info ==="
          file $BIN
          echo "=== Static check ==="
          ldd $BIN || echo "Static confirmed."
          echo "=== Version ==="
          $BIN --version
          echo "=== Size ==="
          ls -lh $BIN

          mkdir -p output
          cp $BIN output/git
          cp $BIN output/git-${TAG}-android-arm64-static

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-android-arm64-static
          path: output/
          retention-days: 7
