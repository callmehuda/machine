name: Build Static Git for Android ARM64

on:
  workflow_dispatch:
    inputs:
      git_version:
        description: 'Git version to build (e.g. 2.47.2)'
        required: false
        default: '2.53.0'
  push:
    branches: "main"
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-24.04-arm  # Native ARM64 runner (free for public repos)
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Git version
        id: vars
        run: |
          VERSION="${{ github.event.inputs.git_version || '2.47.2' }}"
          echo "GIT_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Building git version: $VERSION"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            libcurl4-openssl-dev \
            libexpat-dev \
            zlib1g-dev \
            gettext \
            wget

      - name: Download Git source
        run: |
          wget -q https://www.kernel.org/pub/software/scm/git/git-${{ env.GIT_VERSION }}.tar.gz
          tar xzf git-${{ env.GIT_VERSION }}.tar.gz

      - name: Install musl-tools for static linking
        run: |
          sudo apt-get install -y musl-tools musl-dev

      - name: Build static git binary
        run: |
          cd git-${{ env.GIT_VERSION }}

          # Install static libraries
          sudo apt-get install -y \
            libssl-dev \
            zlib1g-dev \
            libexpat1-dev

          # Configure untuk static build
          make configure
          ./configure \
            CC=musl-gcc \
            CFLAGS="-Os" \
            LDFLAGS="-static -s" \
            --prefix=/usr/local \
            --without-tcltk \
            --without-python \
            NO_PERL=1 \
            NO_TCLTK=1

          # Build
          make -j$(nproc) \
            NO_TCLTK=1 \
            NO_PYTHON=1 \
            NO_PERL=1 \
            LDFLAGS="-static -s" \
            CC=musl-gcc

          # Strip untuk minimize size
          strip git || true

          # Verifikasi binary
          file git
          ldd git || echo "Static binary confirmed (ldd failed = good)"
          ./git --version

      - name: Prepare output
        run: |
          mkdir -p output
          cp git-${{ env.GIT_VERSION }}/git output/git
          
          # Rename dengan versi dan arch
          cp output/git output/git-${{ env.GIT_VERSION }}-android-arm64-static
          
          # Info binary
          echo "=== Binary Info ==="
          file output/git
          ls -lh output/git
          echo "Version:"
          output/git --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-${{ env.GIT_VERSION }}-android-arm64-static
          path: output/
          retention-days: 90

      - name: Create Release (jika di-trigger dari tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            output/git-${{ env.GIT_VERSION }}-android-arm64-static
          body: |
            ## Static Git ${{ env.GIT_VERSION }} for Android ARM64
            
            Binary ini dicompile secara static menggunakan musl-gcc di native ARM64 runner.
            Tidak perlu Termux atau shared library tambahan.
            
            ### Cara Pakai di MT Manager Terminal
            ```bash
            # Copy binary ke storage
            cp /path/to/git /data/local/tmp/git
            chmod +x /data/local/tmp/git
            
            # Setup
            export HOME=/sdcard
            /data/local/tmp/git config --global user.name "Nama"
            /data/local/tmp/git config --global user.email "email@example.com"
            
            # Clone
            /data/local/tmp/git clone https://username:TOKEN@github.com/user/repo
            ```
          generate_release_notes: false
