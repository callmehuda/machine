name: Build Static Git for Android ARM64

on:
  workflow_dispatch:
  push:
    branches: "main"

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Get latest git tag from git/git
        id: latest
        run: |
          LATEST_TAG=$(git ls-remote --tags --sort='-v:refname' \
            https://github.com/git/git.git \
            'v[0-9]*.[0-9]*.[0-9]*' \
            | grep -v '\^{}' \
            | head -1 \
            | sed 's|.*refs/tags/||')
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest git tag: $LATEST_TAG"

      - name: Clone git/git at latest tag
        run: |
          TAG="${{ steps.latest.outputs.tag }}"
          git clone --depth 1 --branch $TAG https://github.com/git/git.git git-src
          cd git-src && git log --oneline -1

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential \
            zlib1g-dev \
            libssl-dev \
            libexpat1-dev \
            libcurl4-openssl-dev \
            libpcre2-dev \
            gettext \
            pkg-config

      - name: Build static git binary
        run: |
          cd git-src

          make configure
          ./configure \
            CC=gcc \
            CFLAGS="-Os -ffunction-sections -fdata-sections" \
            LDFLAGS="-static -Wl,--gc-sections" \
            --prefix=/tmp/git-install \
            NO_TCLTK=1 \
            NO_PYTHON=1 \
            NO_PERL=1 \
            NO_GETTEXT=1 \
            NO_ICONV=1

          make -j$(nproc) \
            CC=gcc \
            CFLAGS="-Os -ffunction-sections -fdata-sections" \
            LDFLAGS="-static -Wl,--gc-sections" \
            NO_TCLTK=1 \
            NO_PYTHON=1 \
            NO_PERL=1 \
            NO_GETTEXT=1 \
            NO_ICONV=1

          make install \
            NO_TCLTK=1 NO_PYTHON=1 NO_PERL=1 NO_GETTEXT=1 NO_ICONV=1

      - name: Package minimal
        run: |
          INSTALL=/tmp/git-install
          OUT=/tmp/git-out

          mkdir -p $OUT/bin
          mkdir -p $OUT/libexec/git-core
          mkdir -p $OUT/share/git-core/templates

          # Binary utama
          cp $INSTALL/bin/git $OUT/bin/git
          strip $OUT/bin/git

          # Hanya remote helpers yang dibutuhkan untuk HTTPS
          # git-remote-https biasanya hardlink ke git, tapi kita butuh dia ada di libexec
          cp $INSTALL/libexec/git-core/git-remote-https $OUT/libexec/git-core/ 2>/dev/null || \
            cp $OUT/bin/git $OUT/libexec/git-core/git-remote-https
          cp $INSTALL/libexec/git-core/git-remote-http  $OUT/libexec/git-core/ 2>/dev/null || \
            cp $OUT/bin/git $OUT/libexec/git-core/git-remote-http

          # Strip remote helpers
          strip $OUT/libexec/git-core/git-remote-https 2>/dev/null || true
          strip $OUT/libexec/git-core/git-remote-http  2>/dev/null || true

          # Templates
          cp -r $INSTALL/share/git-core/templates/. $OUT/share/git-core/templates/

          chmod +x $OUT/git.sh

          echo "=== Contents ==="
          find $OUT -type f | sort
          echo "=== Sizes ==="
          du -sh $OUT/
          ls -lh $OUT/bin/git
          ls -lh $OUT/libexec/git-core/

          echo "=== Verify ==="
          $OUT/bin/git --version
          $OUT/bin/git version --build-options

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-${{ steps.latest.outputs.tag }}-android-arm64-static
          path: /tmp/git-out/
          retention-days: 7
