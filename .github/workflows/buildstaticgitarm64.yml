name: Build Static Git for Android ARM64

on:
  workflow_dispatch:
  push:
    branches: "main"

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Get latest git tag from git/git
        id: latest
        run: |
          LATEST_TAG=$(git ls-remote --tags --sort='-v:refname' \
            https://github.com/git/git.git \
            'v[0-9]*.[0-9]*.[0-9]*' \
            | grep -v '\^{}' \
            | head -1 \
            | sed 's|.*refs/tags/||')
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest git tag: $LATEST_TAG"

      - name: Clone git/git at latest tag
        run: |
          TAG="${{ steps.latest.outputs.tag }}"
          git clone --depth 1 --branch $TAG https://github.com/git/git.git git-src
          cd git-src && git log --oneline -1

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential \
            zlib1g-dev \
            libssl-dev \
            libexpat1-dev \
            libcurl4-openssl-dev \
            libpcre2-dev \
            gettext \
            pkg-config

      - name: Build static git binary
        run: |
          cd git-src

          make configure
          ./configure \
            CC=gcc \
            CFLAGS="-Os -ffunction-sections -fdata-sections" \
            LDFLAGS="-static -Wl,--gc-sections" \
            --prefix=/tmp/git-install \
            NO_TCLTK=1 \
            NO_PYTHON=1 \
            NO_PERL=1 \
            NO_GETTEXT=1 \
            NO_ICONV=1

          make -j$(nproc) \
            CC=gcc \
            CFLAGS="-Os -ffunction-sections -fdata-sections" \
            LDFLAGS="-static -Wl,--gc-sections" \
            NO_TCLTK=1 \
            NO_PYTHON=1 \
            NO_PERL=1 \
            NO_GETTEXT=1 \
            NO_ICONV=1

          make install \
            NO_TCLTK=1 NO_PYTHON=1 NO_PERL=1 NO_GETTEXT=1 NO_ICONV=1

      - name: Strip & deduplicate libexec
        run: |
          INSTALL=/tmp/git-install

          echo "=== Size sebelum ==="
          du -sh $INSTALL/

          # Strip semua binary
          strip $INSTALL/bin/git
          find $INSTALL/libexec/git-core -type f -executable | xargs strip 2>/dev/null || true

          # libexec berisi puluhan copy binary yang identik dengan git utama
          # Ganti semua yang identik dengan hardlink ke git utama
          GIT_BIN=$INSTALL/bin/git
          for f in $INSTALL/libexec/git-core/*; do
            [ -f "$f" ] && cmp -s "$GIT_BIN" "$f" && ln -f "$GIT_BIN" "$f"
          done

          echo "=== Size sesudah dedupe ==="
          du -sh $INSTALL/

      - name: Verify
        run: |
          BIN=/tmp/git-install/bin/git
          file $BIN
          ldd $BIN || echo "Static confirmed."
          $BIN --version
          $BIN version --build-options
          ls -lh $BIN

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-${{ steps.latest.outputs.tag }}-android-arm64-static
          path: /tmp/git-install/
          retention-days: 7
