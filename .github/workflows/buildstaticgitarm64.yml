name: Build Static Git for Android ARM64

on:
  workflow_dispatch:
  push:
    branches: "main"

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Get latest git tag from git/git
        id: latest
        run: |
          LATEST_TAG=$(git ls-remote --tags --sort='-v:refname' \
            https://github.com/git/git.git \
            'v[0-9]*.[0-9]*.[0-9]*' \
            | grep -v '\^{}' \
            | head -1 \
            | sed 's|.*refs/tags/||')
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest git tag: $LATEST_TAG"

      - name: Clone git/git at latest tag
        run: |
          TAG="${{ steps.latest.outputs.tag }}"
          git clone --depth 1 --branch $TAG https://github.com/git/git.git

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential \
            zlib1g-dev \
            libssl-dev \
            libexpat1-dev \
            libcurl4-openssl-dev \
            libpcre2-dev \
            gettext \
            pkg-config

      - name: Build static git binary
        run: |
          cd git
          mkdir -p myoutput

          make configure
          ./configure prefix=$(pwd)/myoutput
          make LDFLAGS="-static" NO_TCLTK=1 NO_PYTHON=1 NO_PERL=1
          make install LDFLAGS="-static" NO_TCLTK=1 NO_PYTHON=1 NO_PERL=1
          make clean
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-${{ steps.latest.outputs.tag }}-android-arm64-static
          path: ./git/myoutput
          retention-days: 7
