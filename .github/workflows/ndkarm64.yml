name: Build NDK r27d AArch64

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-ndk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git clang bison llvm llvm-dev python3 lld ninja-build cmake \
            crossbuild-essential-arm64 repo

      - name: Prepare directories
        run: |
          mkdir -p $GITHUB_WORKSPACE/llvm-toolchain
          mkdir -p $GITHUB_WORKSPACE/aarch64ndk
          echo "llvm-toolchain=$GITHUB_WORKSPACE/llvm-toolchain" >> $GITHUB_ENV
          echo "aarch64ndk=$GITHUB_WORKSPACE/aarch64ndk" >> $GITHUB_ENV

      - name: Download NDK source
        run: |
          cd $llvm-toolchain
          repo init -u https://android.googlesource.com/platform/manifest -b llvm-toolchain
          repo sync -c

      - name: Clone modified ndk-aarch64-linux repo
        run: |
          cd $aarch64ndk
          git clone https://github.com/SnowNF/ndk-aarch64-linux

      - name: Replace source code
        run: |
          cd $llvm-toolchain/toolchain/llvm_android
          mv patches ../patches || true
          rm -rf *
          cp -rf $aarch64ndk/ndk-aarch64-linux/* .
          mv ../patches patches || true

      - name: Build Clang for aarch64
        run: |
          cd $llvm-toolchain
          python3 toolchain/llvm_android/build.py \
            --no-build windows --skip-tests --single-stage --no-musl

      - name: Package artifacts
        run: |
          mkdir -p $GITHUB_WORKSPACE/artifacts
          cp -r $llvm-toolchain/out/stage2/bin $GITHUB_WORKSPACE/artifacts/
          cp -r $llvm-toolchain/out/stage2/lib $GITHUB_WORKSPACE/artifacts/
          cp -r $llvm-toolchain/out/stage2/include $GITHUB_WORKSPACE/artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ndk-r27d-aarch64
          path: $GITHUB_WORKSPACE/artifacts