name: Build Android NDK r27d (aarch64)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build LLVM Toolchain for NDK r27d
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360

    env:
      SOURCE_ROOT: ${{ github.workspace }}/llvm-source
      R27: ${{ github.workspace }}/ndk-r27d

    steps:
      # ─── 1. Install Dependencies ───────────────────────────────────────────
      - name: Install required packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libc++-dev bison ninja-build cmake \
            python3 git curl wget unzip \
            build-essential libssl-dev

      # ─── 2. Set up repo tool ───────────────────────────────────────────────
      - name: Install repo tool
        run: |
          mkdir -p ~/.local/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/.local/bin/repo
          chmod a+x ~/.local/bin/repo
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # ─── 3. Clone LLVM source ──────────────────────────────────────────────
      - name: Clone LLVM Android source
        run: |
          mkdir -p $SOURCE_ROOT
          cd $SOURCE_ROOT
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"
          repo init -u https://android.googlesource.com/platform/manifest -b llvm-toolchain
          repo sync -c --no-tags --no-clone-bundle -j$(nproc)

      # ─── 4. Create Symlinks ────────────────────────────────────────────────
      - name: Create required symlinks
        run: |
          mkdir -p $SOURCE_ROOT/prebuilts/build-tools/linux-arm64/bin
          ln -sf $(which bison) $SOURCE_ROOT/prebuilts/build-tools/linux-arm64/bin/bison
          ln -sf $(which ninja) $SOURCE_ROOT/prebuilts/build-tools/linux-arm64/bin/ninja

          mkdir -p $SOURCE_ROOT/prebuilts/clang/host
          ln -sf /usr $SOURCE_ROOT/prebuilts/clang/host/linux-arm64

          mkdir -p $SOURCE_ROOT/prebuilts/cmake
          ln -sf /usr $SOURCE_ROOT/prebuilts/cmake/linux-arm64

          mkdir -p $SOURCE_ROOT/prebuilts/python
          ln -sf /usr $SOURCE_ROOT/prebuilts/python/linux-arm64

      # ─── 5. Write patch scripts ke file terpisah ──────────────────────────
      # Ditulis sebagai file .py agar tidak terkena masalah indentasi YAML heredoc
      - name: Write patch scripts
        run: |
          # patch_do_build.py
          cat > /tmp/patch_do_build.py << 'EOF'
import pathlib, sys

path = pathlib.Path(sys.argv[1])
lines = path.read_text().splitlines(keepends=True)

result = []
skip = False
bootstrap_use_done = False
bootstrap_build_done = False

i = 0
while i < len(lines):
    line = lines[i]
    stripped = line.lstrip()

    # Comment out block: "if not args.bootstrap_use_prebuilt..."
    # sampai baris "set_default_toolchain(stage1.installed_toolchain)"
    if stripped.startswith("if not args.bootstrap_use_prebuilt and not args.bootstrap_use:"):
        skip = True

    if skip and not bootstrap_use_done and not bootstrap_build_done:
        result.append("# " + line)
        if "set_default_toolchain(stage1.installed_toolchain)" in line:
            skip = False
            indent = len(line) - len(line.lstrip())
            result.append(" " * indent + 'set_default_toolchain(toolchains.Toolchain(Path("/usr"),Path("/usr")))\n')
        i += 1
        continue

    # Comment out block: "if args.bootstrap_use:"
    if not bootstrap_use_done and stripped.startswith("if args.bootstrap_use:"):
        bootstrap_use_done = True
        skip = True

    if skip and bootstrap_use_done and not bootstrap_build_done:
        result.append("# " + line)
        # Blok selesai saat indent kembali ke level if (baris non-kosong non-comment di level sama)
        if i + 1 < len(lines):
            next_stripped = lines[i+1].lstrip()
            next_indent = len(lines[i+1]) - len(next_stripped)
            cur_indent = len(line) - len(line.lstrip())
            if next_stripped and next_indent <= cur_indent and not next_stripped.startswith("#"):
                skip = False
        i += 1
        continue

    # Comment out block: "if args.bootstrap_build_only:"
    if not bootstrap_build_done and stripped.startswith("if args.bootstrap_build_only:"):
        bootstrap_build_done = True
        skip = True

    if skip and bootstrap_build_done:
        result.append("# " + line)
        if stripped.startswith("return"):
            skip = False
        i += 1
        continue

    result.append(line)
    i += 1

path.write_text("".join(result))
print("patch_do_build.py: DONE")
EOF

          # patch_libxml2_xz.py
          cat > /tmp/patch_libxml2_xz.py << 'EOF'
import pathlib, sys
path = pathlib.Path(sys.argv[1])
content = path.read_text()
content = content.replace("        libxml2_builder.build()", "        # libxml2_builder.build()")
content = content.replace("            xz_builder.build()", "            # xz_builder.build()")
path.write_text(content)
print("patch_libxml2_xz.py: DONE")
EOF

          # patch_builders.py
          cat > /tmp/patch_builders.py << 'EOF'
import pathlib, sys
path = pathlib.Path(sys.argv[1])
content = path.read_text()
old = "            if self.debug_build:\n                defines['CMAKE_BUILD_TYPE'] = 'Debug'"
new = (
    "            if self.debug_build:\n"
    "                defines['CMAKE_BUILD_TYPE'] = 'Debug'\n"
    "            else:\n"
    "                defines['CMAKE_BUILD_TYPE'] = 'Release'"
)
if old in content:
    content = content.replace(old, new)
    path.write_text(content)
    print("patch_builders.py: DONE")
else:
    print("WARNING: pattern not found in builders.py, skipping")
EOF

          # patch_configs.py
          cat > /tmp/patch_configs.py << 'EOF'
import pathlib, sys
path = pathlib.Path(sys.argv[1])
content = path.read_text()
replacements = [
    (
        "sysroot: Optional[Path] = paths.GCC_ROOT / 'host' / 'x86_64-linux-glibc2.17-4.8' / 'sysroot'",
        "sysroot: Optional[Path] = Path('/')"
    ),
    (
        "gcc_root: Path = paths.GCC_ROOT / 'host' / 'x86_64-linux-glibc2.17-4.8'",
        "gcc_root: Path = Path('/')"
    ),
    (
        "gcc_triple: str = 'x86_64-linux'",
        "gcc_triple: str = 'aarch64-linux'"
    ),
    (
        "return 'i386-unknown-linux-gnu' if self.is_32_bit else 'x86_64-unknown-linux-gnu'",
        "return 'i386-unknown-linux-gnu' if self.is_32_bit else 'aarch64-unknown-linux-gnu'"
    ),
]
for old, new in replacements:
    if old not in content:
        print(f"WARNING: not found: {old[:60]}")
    else:
        content = content.replace(old, new)
path.write_text(content)
print("patch_configs.py: DONE")
EOF

          # patch_hosts.py
          cat > /tmp/patch_hosts.py << 'EOF'
import pathlib, sys
path = pathlib.Path(sys.argv[1])
content = path.read_text()
content = content.replace("Host.Linux: 'linux-x86'", "Host.Linux: 'linux-arm64'")
path.write_text(content)
print("patch_hosts.py: DONE")
EOF

          # patch_paths.py
          cat > /tmp/patch_paths.py << 'EOF'
import pathlib, re, sys
path = pathlib.Path(sys.argv[1])
content = path.read_text()
# Hapus / constants.CLANG_PREBUILT_VERSION dari CLANG_PREBUILT_DIR
content = re.sub(
    r"(CLANG_PREBUILT_DIR: Path = \(PREBUILTS_DIR / 'clang' / 'host' / hosts\.build_host\(\)\.os_tag)"
    r"\s*\n\s*/ constants\.CLANG_PREBUILT_VERSION(\))",
    r"\1\2",
    content
)
# Ganti os_tag_musl -> os_tag untuk ninja
content = content.replace(
    "NINJA_BIN_PATH: Path = BUILD_TOOLS_DIR / hosts.build_host().os_tag_musl / 'bin' / 'ninja'",
    "NINJA_BIN_PATH: Path = BUILD_TOOLS_DIR / hosts.build_host().os_tag / 'bin' / 'ninja'"
)
path.write_text(content)
print("patch_paths.py: DONE")
EOF

      # ─── 6. Apply patches ─────────────────────────────────────────────────
      - name: Patch do_build.py – disable stage1, use system toolchain
        run: |
          python3 /tmp/patch_do_build.py \
            $SOURCE_ROOT/toolchain/llvm_android/do_build.py
          python3 -m py_compile \
            $SOURCE_ROOT/toolchain/llvm_android/do_build.py \
            && echo "Syntax check: OK"

      - name: Patch do_build.py – disable libxml2 and xz build
        run: |
          python3 /tmp/patch_libxml2_xz.py \
            $SOURCE_ROOT/toolchain/llvm_android/do_build.py
          python3 -m py_compile \
            $SOURCE_ROOT/toolchain/llvm_android/do_build.py \
            && echo "Syntax check: OK"

      - name: Patch py3_utils.py – host tag linux-arm64
        run: |
          sed -i "s/return 'linux-x86'/return 'linux-arm64'/" \
            $SOURCE_ROOT/toolchain/llvm_android/py3_utils.py
          echo "Patched py3_utils.py OK"

      - name: Patch builders.py – add Release CMake build type
        run: |
          python3 /tmp/patch_builders.py \
            $SOURCE_ROOT/toolchain/llvm_android/src/llvm_android/builders.py

      - name: Patch configs.py – ARM64 triple and sysroot
        run: |
          python3 /tmp/patch_configs.py \
            $SOURCE_ROOT/toolchain/llvm_android/src/llvm_android/configs.py

      - name: Patch hosts.py – Linux host tag linux-arm64
        run: |
          python3 /tmp/patch_hosts.py \
            $SOURCE_ROOT/toolchain/llvm_android/src/llvm_android/hosts.py

      - name: Patch paths.py – fix clang prebuilt dir and ninja path
        run: |
          python3 /tmp/patch_paths.py \
            $SOURCE_ROOT/toolchain/llvm_android/src/llvm_android/paths.py

      # ─── 7. Verify semua patch syntax OK ─────────────────────────────────
      - name: Verify patched files – syntax check
        run: |
          FILES=(
            "$SOURCE_ROOT/toolchain/llvm_android/do_build.py"
            "$SOURCE_ROOT/toolchain/llvm_android/py3_utils.py"
            "$SOURCE_ROOT/toolchain/llvm_android/src/llvm_android/builders.py"
            "$SOURCE_ROOT/toolchain/llvm_android/src/llvm_android/configs.py"
            "$SOURCE_ROOT/toolchain/llvm_android/src/llvm_android/hosts.py"
            "$SOURCE_ROOT/toolchain/llvm_android/src/llvm_android/paths.py"
          )
          for f in "${FILES[@]}"; do
            python3 -m py_compile "$f" && echo "OK: $(basename $f)" || { echo "FAIL: $f"; exit 1; }
          done

      # ─── 8. Build Toolchain ───────────────────────────────────────────────
      - name: Build LLVM toolchain
        run: |
          cd $SOURCE_ROOT
          python3 toolchain/llvm_android/build.py \
            --no-build windows \
            --skip-tests \
            --no-musl

      # ─── 9. Download NDK r27d ─────────────────────────────────────────────
      - name: Download Android NDK r27d
        run: |
          mkdir -p $R27
          wget -q \
            https://dl.google.com/android/repository/android-ndk-r27d-linux.zip \
            -O /tmp/ndk-r27d.zip
          unzip -q /tmp/ndk-r27d.zip -d /tmp/ndk-extract
          mv /tmp/ndk-extract/android-ndk-r27d/* $R27/

      # ─── 10. Patch NDK r27d ───────────────────────────────────────────────
      - name: Patch NDK r27d – copy built toolchain
        run: |
          # Build tool symlinks
          ln -sf $(which make) $R27/prebuilt/linux-x86_64/bin/make
          ln -sf $(which yasm) $R27/prebuilt/linux-x86_64/bin/yasm 2>/dev/null || true

          # Copy binaries hasil build stage2
          cp -f $SOURCE_ROOT/out/stage2/bin/* \
            $R27/toolchains/llvm/prebuilt/linux-x86_64/bin/

          # Copy clang runtime libs versi 22
          cp -r $SOURCE_ROOT/out/stage2/lib/clang/22 \
            $R27/toolchains/llvm/prebuilt/linux-x86_64/lib/clang/

          # Salin linux runtime dari clang 21 ke 22 jika belum ada
          CLANG22_LIB=$R27/toolchains/llvm/prebuilt/linux-x86_64/lib/clang/22/lib
          if [ ! -d "$CLANG22_LIB/linux" ]; then
            cp -r \
              $R27/toolchains/llvm/prebuilt/linux-x86_64/lib/clang/21/lib/linux \
              "$CLANG22_LIB/"
          fi

          # Python symlink
          ln -sf $(which python3) \
            $R27/toolchains/llvm/prebuilt/linux-x86_64/python3/bin/python3.11

      - name: Patch ndk_bin_common.sh – add aarch64 support
        run: |
          COMMON_SH=$R27/build/tools/ndk_bin_common.sh
          sed -i 's/x86_64|amd64)/x86_64|amd64|aarch64)/' "$COMMON_SH"
          grep "HOST_ARCH" "$COMMON_SH" | head -5

      # ─── 11. Package & Upload ─────────────────────────────────────────────
      - name: Package patched NDK r27d
        run: |
          cd ${{ github.workspace }}
          zip -r android-ndk-r27d-aarch64-linux.zip ndk-r27d/

      - name: Upload NDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-ndk-r27d-aarch64
          path: ${{ github.workspace }}/android-ndk-r27d-aarch64-linux.zip
          retention-days: 7

      - name: Upload logs on failure=
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ${{ env.SOURCE_ROOT }}/out/**/*.log
            /tmp/patch_*.py
          retention-days: 3
