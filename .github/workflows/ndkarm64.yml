jobs:
  build-ndk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git clang bison llvm llvm-dev python3 lld ninja-build cmake \
            crossbuild-essential-arm64 repo

      - name: Prepare directories
        run: |
          mkdir -p $GITHUB_WORKSPACE/llvm-toolchain
          mkdir -p $GITHUB_WORKSPACE/aarch64ndk
        env:
          llvm_toolchain: ${{ github.workspace }}/llvm-toolchain
          aarch64ndk: ${{ github.workspace }}/aarch64ndk

      - name: Download NDK source
        run: |
          cd ${{ github.workspace }}/llvm-toolchain
          repo init -u https://android.googlesource.com/platform/manifest -b llvm-toolchain
          repo sync -c

      - name: Clone modified ndk-aarch64-linux repo
        run: |
          cd ${{ github.workspace }}/aarch64ndk
          git clone https://github.com/SnowNF/ndk-aarch64-linux

      - name: Replace source code
        run: |
          cd ${{ github.workspace }}/llvm-toolchain/toolchain/llvm_android
          mv patches ../patches || true
          rm -rf *
          cp -rf ${{ github.workspace }}/aarch64ndk/ndk-aarch64-linux/* .
          mv ../patches patches || true

      - name: Build Clang for aarch64
        run: |
          cd ${{ github.workspace }}/llvm-toolchain
          python3 toolchain/llvm_android/build.py \
            --no-build windows --skip-tests --single-stage --no-musl